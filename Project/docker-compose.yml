version: '3.8'

networks:
  scdp-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:

services:
  # ----------------------------------------------------
  # Databases & Caches
  # ----------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: scdp-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scdp_db}
      POSTGRES_USER: ${POSTGRES_USER:-scdp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scdp_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scdp-network

  mongo-db:
    image: mongo:7.0
    container_name: scdp-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - scdp-network

  redis-cache:
    image: redis:7.2-alpine
    container_name: scdp-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scdp-network

  # ----------------------------------------------------
  # Microservices
  # ----------------------------------------------------
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: scdp-auth-svc
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${POSTGRES_DB:-scdp_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-scdp_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-scdp_password}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_32_chars_min}
    depends_on:
      - postgres-db
    networks:
      - scdp-network

  menu-service:
    build:
      context: ./menu-service
      dockerfile: Dockerfile
    container_name: scdp-menu-svc
    restart: always
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo-db:27017/scdp_menu
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
    depends_on:
      - mongo-db
      - redis-cache
    networks:
      - scdp-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: scdp-order-svc
    restart: always
    environment:
      PORT: 3002
      POSTGRES_URI: postgresql://${POSTGRES_USER:-scdp_user}:${POSTGRES_PASSWORD:-scdp_password}@postgres-db:5432/${POSTGRES_DB:-scdp_db}
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis-cache
    networks:
      - scdp-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: scdp-notif-svc
    restart: always
    environment:
      PORT: 3004
      REDIS_HOST: redis-cache
      REDIS_PORT: 6379
    depends_on:
      - redis-cache
    networks:
      - scdp-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: scdp-payment-svc
    restart: always
    environment:
      PORT: 3003
      POSTGRES_URI: postgresql://${POSTGRES_USER:-scdp_user}:${POSTGRES_PASSWORD:-scdp_password}@postgres-db:5432/${POSTGRES_DB:-scdp_db}
    depends_on:
      - postgres-db
    networks:
      - scdp-network

  # ----------------------------------------------------
  # API Gateway / Reverse Proxy
  # ----------------------------------------------------
  nginx-gateway:
    image: nginx:alpine
    container_name: scdp-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - menu-service
      - order-service
      - notification-service
      - payment-service
    networks:
      - scdp-network
