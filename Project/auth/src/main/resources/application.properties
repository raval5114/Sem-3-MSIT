spring.application.name=auth-service
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scdp_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:scdp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:scdp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security & JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_32_chars_min}
jwt.expiration-ms=86400000
